<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="celHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#59ABDF"/>
      <stop offset="50%" stop-color="#7989C4"/>
      <stop offset="100%" stop-color="#8854A3"/>
    </linearGradient>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1120" height="900" fill="#f7f8fa"/>

  <!-- Header -->
  <rect x="0" y="0" width="1120" height="58" fill="url(#celHeader)"/>
  <text x="24" y="27" font-size="19" font-weight="700" fill="#ffffff">CELESTIAL ELECTRIC</text>
  <text x="24" y="47" font-size="13" fill="#eef">Mobile Power Trailer Monitor &#8212; Enclosure &amp; Home-Run Installation Diagram</text>
  <text x="1096" y="27" font-size="13" font-weight="700" fill="#F16029" text-anchor="end">HELIOS PRIME</text>
  <text x="1096" y="47" font-size="12" fill="#eef" text-anchor="end">UNO R4 WiFi &#183; low-voltage sensing only</text>

  <!-- Trailer equipment bay border -->
  <rect x="70" y="78" width="985" height="626" rx="10" fill="none" stroke="#b7c0cc" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="82" y="98" font-size="12" font-weight="700" fill="#8794a4">TRAILER EQUIPMENT BAY &#183; SC-01 SOL-C</text>
  <!-- floor hatch -->
  <line x1="72" y1="690" x2="1053" y2="690" stroke="#c9a24a" stroke-width="2"/>
  <text x="1048" y="684" font-size="10.5" fill="#a5842f" text-anchor="end">bay floor (low point)</text>

  <!-- ================= ENCLOSURE ================= -->
  <rect x="110" y="140" width="420" height="470" rx="10" fill="#eef4f4" stroke="#0c6b6b" stroke-width="2.5"/>
  <text x="126" y="164" font-size="15" font-weight="700" fill="#0c6b6b">ENC-01  Sensor Enclosure</text>
  <text x="126" y="182" font-size="11.5" fill="#127" >Polycarbonate NEMA 4X &#8212; RF-transparent, vibration-isolated</text>
  <!-- isolator feet -->
  <circle cx="118" cy="148" r="4" fill="#555"/><circle cx="522" cy="148" r="4" fill="#555"/>
  <circle cx="118" cy="602" r="4" fill="#555"/><circle cx="522" cy="602" r="4" fill="#555"/>

  <!-- Arduino -->
  <rect x="150" y="205" width="170" height="175" rx="8" fill="#0c6b6b" stroke="#063f3f" stroke-width="2"/>
  <text x="235" y="232" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Arduino</text>
  <text x="235" y="250" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">UNO R4 WiFi</text>
  <!-- right pins -->
  <g font-size="11.5" fill="#eafff9" font-weight="700" text-anchor="end">
    <circle cx="320" cy="286" r="4" fill="#ffd24a"/><text x="312" y="290">D2</text>
    <circle cx="320" cy="312" r="4" fill="#ffd24a"/><text x="312" y="316">D3</text>
    <circle cx="320" cy="338" r="4" fill="#7CFC7C"/><text x="312" y="342">D5</text>
    <circle cx="320" cy="364" r="4" fill="#ff8080"/><text x="312" y="368">D6</text>
  </g>
  <!-- USB-C port bottom -->
  <rect x="216" y="380" width="38" height="12" fill="#111"/>
  <text x="235" y="404" font-size="10.5" fill="#0c6b6b" text-anchor="middle">USB-C</text>
  <!-- Qwiic left -->
  <rect x="136" y="292" width="14" height="22" fill="#111"/>
  <text x="120" y="288" font-size="10" fill="#0aa1a1" text-anchor="middle">QWIIC</text>

  <!-- BME280 local -->
  <rect x="140" y="430" width="150" height="46" rx="6" fill="#ffffff" stroke="#0aa1a1" stroke-width="2"/>
  <text x="215" y="450" font-size="12.5" font-weight="700" fill="#0c6b6b" text-anchor="middle">BME280 (local)</text>
  <text x="215" y="467" font-size="10.5" fill="#0aa1a1" text-anchor="middle">short Qwiic &#8212; keep in enclosure</text>
  <path d="M143 303 H128 V452 H140" stroke="#0aa1a1" stroke-width="3.5" fill="none"/>

  <!-- Face LEDs -->
  <circle cx="165" cy="540" r="8" fill="#1e9e4a" stroke="#0a5f2a"/>
  <circle cx="205" cy="540" r="8" fill="#d62828" stroke="#7d1414"/>
  <text x="150" y="565" font-size="10.5" fill="#333">Face LEDs (door): green=NORMAL, red=ALERT</text>
  <text x="150" y="580" font-size="10" fill="#777">each via 220&#937; inside enclosure</text>
  <path d="M320 338 V520 H165 V532" stroke="#1e9e4a" stroke-width="2" fill="none"/>
  <path d="M320 364 V512 H205 V532" stroke="#d62828" stroke-width="2" fill="none"/>

  <!-- Terminal block -->
  <rect x="372" y="210" width="132" height="250" rx="6" fill="#ffffff" stroke="#555" stroke-width="1.5"/>
  <text x="438" y="230" font-size="11.5" font-weight="700" fill="#333" text-anchor="middle">DIN TERMINALS</text>
  <g font-size="10.5" fill="#222">
    <line x1="378" y1="248" x2="392" y2="248" stroke="#d62828" stroke-width="3"/><text x="398" y="252">5V</text>
    <line x1="378" y1="272" x2="392" y2="272" stroke="#222" stroke-width="3"/><text x="398" y="276">GND</text>
    <line x1="378" y1="300" x2="392" y2="300" stroke="#1d6fb8" stroke-width="3"/><text x="398" y="304">DR sig &#8594; D2</text>
    <line x1="378" y1="324" x2="392" y2="324" stroke="#222" stroke-width="3"/><text x="398" y="328">DR return</text>
    <line x1="378" y1="352" x2="392" y2="352" stroke="#1d6fb8" stroke-width="3"/><text x="398" y="356">WL DO &#8594; D3</text>
    <line x1="378" y1="376" x2="392" y2="376" stroke="#d62828" stroke-width="3"/><text x="398" y="380">WL V+ (5V)</text>
    <line x1="378" y1="400" x2="392" y2="400" stroke="#222" stroke-width="3"/><text x="398" y="404">WL GND</text>
  </g>
  <!-- pull-up resistor -->
  <rect x="430" y="286" width="26" height="10" fill="#f0c040" stroke="#a07800"/>
  <text x="463" y="294" font-size="9.5" fill="#a07800">4.7k&#8594;5V</text>
  <!-- internal harness band -->
  <path d="M322 300 H372" stroke="#bbb" stroke-width="10" fill="none" opacity="0.6"/>
  <text x="347" y="285" font-size="9" fill="#888" text-anchor="middle">harness</text>

  <!-- single-point ground bar -->
  <rect x="372" y="470" width="132" height="14" rx="3" fill="#333"/>
  <text x="438" y="481" font-size="9.5" fill="#fff" text-anchor="middle">GND / SHIELD single-point</text>
  <path d="M438 484 V498 M428 498 H448 M431 503 H445 M434 508 H442" stroke="#333" stroke-width="2" fill="none"/>

  <!-- ================= GLANDS (bottom entry) ================= -->
  <g>
    <rect x="188" y="604" width="24" height="14" fill="#8a8f97"/><text x="200" y="634" font-size="10" fill="#333" text-anchor="middle">G-PWR</text>
    <rect x="388" y="604" width="24" height="14" fill="#8a8f97"/><text x="400" y="634" font-size="10" fill="#333" text-anchor="middle">G-DR</text>
    <rect x="458" y="604" width="24" height="14" fill="#8a8f97"/><text x="470" y="634" font-size="10" fill="#333" text-anchor="middle">G-WL</text>
  </g>
  <text x="300" y="654" font-size="10.5" fill="#a5321a" text-anchor="middle">bottom-entry glands + drip loops (maintains NEMA 4X)</text>

  <!-- Title / revision block -->
  <rect x="690" y="100" width="300" height="50" rx="5" fill="#ffffff" stroke="#0D0F12" stroke-width="1.5"/>
  <rect x="690" y="100" width="300" height="18" fill="#0D0F12"/>
  <text x="698" y="113" font-size="9.5" font-weight="700" fill="#F16029">CELESTIAL ELECTRIC</text>
  <text x="982" y="113" font-size="9" fill="#39C3F2" text-anchor="end">Helios Prime</text>
  <g font-size="9.5" fill="#222">
    <text x="698" y="130" font-weight="700">Enclosure &amp; Home-Run Install</text>
    <text x="698" y="144">DOC: CEL-MPT-DWG-002</text>
    <text x="982" y="130" text-anchor="end">REV 1.0 &#183; 2026-07-02</text>
    <text x="982" y="144" text-anchor="end">SHEET 2 OF 2</text>
  </g>

  <!-- ================= FIELD DEVICES ================= -->
  <!-- door frame element -->
  <line x1="1000" y1="120" x2="1000" y2="300" stroke="#9aa4b1" stroke-width="4"/>
  <text x="1006" y="140" font-size="10" fill="#8794a4">door leaf</text>
  <rect x="820" y="158" width="165" height="66" rx="8" fill="#ffffff" stroke="#1d6fb8" stroke-width="2"/>
  <text x="902" y="180" font-size="13" font-weight="700" fill="#1d6fb8" text-anchor="middle">DR-01 Door Contact</text>
  <text x="902" y="198" font-size="10.5" fill="#444" text-anchor="middle">reed on frame + magnet on leaf</text>
  <text x="902" y="213" font-size="10" fill="#777" text-anchor="middle">shield cut &amp; taped this end</text>

  <!-- leak sensor at floor -->
  <rect x="820" y="628" width="165" height="58" rx="8" fill="#ffffff" stroke="#1d6fb8" stroke-width="2"/>
  <text x="902" y="650" font-size="13" font-weight="700" fill="#1d6fb8" text-anchor="middle">WL-01 Leak Sensor</text>
  <text x="902" y="668" font-size="10.5" fill="#444" text-anchor="middle">at lowest point / drip pan</text>
  <text x="902" y="681" font-size="10" fill="#777" text-anchor="middle">shield cut &amp; taped this end</text>

  <!-- ================= HOME RUNS ================= -->
  <!-- door home run: G-DR -> up-right to door contact -->
  <path d="M400 618 V648 H690 V191 H820" stroke="#7d8590" stroke-width="6" fill="none" opacity="0.55"/>
  <path d="M400 618 V648 H690 V191 H820" stroke="#1d6fb8" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="705" y="420" font-size="10.5" fill="#1d6fb8">DR home run</text>
  <text x="705" y="435" font-size="10" fill="#666">22/2 shielded (alarm cable)</text>

  <!-- leak home run: G-WL -> down-right to leak sensor -->
  <path d="M470 618 V662 H820 V657" stroke="#7d8590" stroke-width="6" fill="none" opacity="0.55"/>
  <path d="M470 618 V662 H820" stroke="#1d6fb8" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="640" y="655" font-size="10.5" fill="#1d6fb8">WL home run &#8212; 22/3 shielded</text>

  <!-- ================= POWER SUPPLY ================= -->
  <rect x="120" y="740" width="210" height="60" rx="8" fill="#ffffff" stroke="#d62828" stroke-width="2"/>
  <text x="225" y="763" font-size="13" font-weight="700" fill="#d62828" text-anchor="middle">PWR-01  5V USB-C Supply</text>
  <text x="225" y="781" font-size="10.5" fill="#444" text-anchor="middle">dedicated, &#8805; 2 A, quality short cable</text>
  <path d="M225 740 V700 H200 V618" stroke="#d62828" stroke-width="6" fill="none" opacity="0.5"/>
  <path d="M225 740 V700 H200 V618" stroke="#d62828" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="235" y="716" font-size="10" fill="#d62828">USB-C to board port</text>

  <!-- ================= NOTES / LEGEND ================= -->
  <rect x="560" y="722" width="495" height="118" rx="8" fill="#ffffff" stroke="#ccc"/>
  <text x="574" y="742" font-size="12.5" font-weight="700" fill="#222">Install notes</text>
  <text x="574" y="761" font-size="10.8" fill="#333">&#8226; Shield grounded at ENCLOSURE end only; cut &amp; taped at each sensor.</text>
  <text x="574" y="777" font-size="10.8" fill="#333">&#8226; Door line: external 4.7k pull-up to 5V for long-run noise immunity.</text>
  <text x="574" y="793" font-size="10.8" fill="#333">&#8226; BME280 stays local (I2C). Remote temp? use DS18B20 (1-Wire).</text>
  <text x="574" y="809" font-size="10.8" fill="#333">&#8226; Non-metallic enclosure preserves WiFi; isolate from vibration.</text>
  <text x="574" y="825" font-size="10.8" fill="#333">&#8226; Land field wires on DIN terminals; drip loops at all glands.</text>

  <!-- Safety strip -->
  <rect x="70" y="852" width="985" height="34" rx="6" fill="#fff2ee" stroke="#F16029"/>
  <text x="86" y="874" font-size="12.5" fill="#a5321a" font-weight="600">SAFETY: Low-voltage sensor wiring ONLY. No connection to battery / PV / inverter / generator / transfer switch or line-voltage. Battery sensing = V2, isolated protected front end.</text>
</svg>
